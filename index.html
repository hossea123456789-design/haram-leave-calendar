rgin:0}

  <main class="app">
    <section class="hero"><div class="hero-top"><div><div class="eyebrow">FAMILY LEAVE CALENDAR · GITHUB SHEETS v021</div><h1>하람 퇴근 캘린더</h1><p>오늘 퇴근 시간과 월간 퇴근 예정만 간단히 확인합니다.</p></div><div class="hero-actions"><button type="button" class="btn ghost" id="reloadBtn">시트 새로고침</button><button type="button" class="btn primary" id="adminBtn" onclick="var p=document.getElementById('adminPanel'); if(p){p.classList.toggle('show');}">관리자</button></div></div></section>

<script>
(function(){

<script>
(()=>{'use strict';
const VERSION='v021';
const API_URL='https://script.google.com/macros/s/AKfycbwgpvNOTMZQppKmLdYBj_238uGSN4fHlRGu1__5yth-oxl4rhc7zF5bS-magPk-weSM1w/exec';
const CACHE_KEY='haram-leave-calendar-cache-v021';
const OLD_CACHE_KEYS=['haram-leave-calendar-cache-v019','haram-leave-calendar-cache-v018','haram-leave-calendar-cache-v017','haram-leave-calendar-cache-v016','haram-leave-calendar-cache-v015','haram-leave-calendar-cache-v014','haram-leave-calendar-cache-v013','haram-leave-calendar-cache-v012','haram-leave-calendar-cache-v011'];
const TOKEN_KEY='haram-leave-calendar-token';
const LOG_KEY='haram-leave-calendar-debug-log-v018';
const DOW=['일','월','화','수','목','금','토'];
let state={data:null,source:'none',lastError:null,loadSeq:0};
const $=id=>document.getElementById(id);
function nowIso(){return new Date().toISOString()}
function safeObj(o){try{return JSON.parse(JSON.stringify(o))}catch(e){return String(o)}}
function log(stage, detail={}){const row={t:nowIso(),v:VERSION,stage,detail:safeObj(detail)}; try{console.log('[HLC]',row); const arr=JSON.parse(localStorage.getItem(LOG_KEY)||'[]'); arr.push(row); while(arr.length>300) arr.shift(); localStorage.setItem(LOG_KEY,JSON.stringify(arr));}catch(e){} renderDebug(false); return row;}
function getLogs(){try{return JSON.parse(localStorage.getItem(LOG_KEY)||'[]')}catch(e){return[]}}
function renderDebug(forceShow){const panel=$('debugPanel'); if(!panel) return; const logs=getLogs(); $('debugSummary').textContent=`버전 ${VERSION} · 로그 ${logs.length}건 · 데이터 ${state.data?state.data.year+'년 '+state.data.month+'월':'없음'} · 출처 ${state.source||'none'}${state.lastError?' · 마지막 오류 '+state.lastError:''}`; $('debugLog').textContent=logs.map(x=>`${x.t} [${x.stage}] ${JSON.stringify(x.detail)}`).join('\n'); if(forceShow) panel.classList.add('show');}
function pad(n){return String(n).padStart(2,'0')} function toDateKey(y,m,d){return `${y}-${pad(m)}-${pad(d)}`}
function todayKey(){const d=new Date();return toDateKey(d.getFullYear(),d.getMonth()+1,d.getDate())}
function normalizeData(data){ if(!data||!Array.isArray(data.items)) return null; return data; }
function itemMap(data){const m=new Map();(data?.items||[]).forEach(i=>{if(i&&i.date)m.set(i.date,i)});return m}
function typeText(i){if(!i)return'정보 없음'; if(i.type==='weekend')return'주말'; if(i.type==='holiday'||i.type==='vacation')return i.label||'휴무'; return i.leave||'정보 없음'}
function displayText(i){if(!i)return'정보 없음'; if(i.type==='work')return i.leave||'정보 없음'; return i.label||typeText(i)}
function classifyLeave(leave,type){ if(type==='vacation'||type==='holiday'||type==='weekend') return 'blue'; if(!leave) return 'gray'; const [h,m]=String(leave).split(':').map(Number); const mins=h*60+(m||0); if(leave==='00:00'||mins<6*60) return 'red'; if(mins>=22*60) return 'red'; if(mins>=20*60) return 'orange'; return 'green'; }
function detailLine(i){if(!i)return''; if(i.type==='work')return i.start?`출근 ${i.start}`:''; return i.label||typeText(i)}
function render(data, source='sheet'){state.data=data; state.source=source; log('render.start',{source,hasData:!!data,items:data?.items?.length||0}); const root=$('content'); if(!data){root.innerHTML='<div class="empty"><h2>아직 표시할 근태 데이터가 없습니다.</h2><p>Google Sheets에 저장된 근태 JSON이 없거나 유효한 최신 행을 찾지 못했습니다.</p></div>'; renderDebug(false); return;} const map=itemMap(data), ti=map.get(todayKey()); root.innerHTML=`<section class="summary"><div class="tile today"><small>TODAY</small><strong class="${classifyLeave(ti?.leave,ti?.type)}">${displayText(ti)}</strong><p>${ti?detailLine(ti):'오늘 근무 정보 없음'}</p></div></section>${calendarHtml(data)}`; renderDebug(false);}
function calendarHtml(data){const y=Number(data.year),m=Number(data.month),first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate(),map=itemMap(data); let cells=''; for(let i=0;i<first;i++)cells+='<div class="day blank"></div>'; for(let d=1;d<=days;d++){const key=toDateKey(y,m,d),it=map.get(key),wd=DOW[new Date(y,m-1,d).getDay()],cls=classifyLeave(it?.leave,it?.type); cells+=`<article class="day ${key===todayKey()?'today':''}"><div class="date-row"><span class="date-num">${d}</span><span class="weekday">${wd}</span></div><div class="main-time ${cls}">${displayText(it)}</div><div class="detail">${detailLine(it)}</div></article>`;} return `<section class="panel"><div class="panel-head"><div><small class="eyebrow" style="color:#6b7280">MONTHLY</small><h2>${data.year}년 ${data.month}월</h2></div><div class="legend"><span><i class="dot" style="background:#047857"></i>18~20시</span><span><i class="dot" style="background:#c2410c"></i>20~22시</span><span><i class="dot" style="background:#b91c1c"></i>22시 이후/00시</span><span><i class="dot" style="background:#4338ca"></i>휴무</span><span><i class="dot" style="background:#4b5563"></i>정보 없음</span></div></div><div class="dow">${DOW.map(x=>`<div>${x}</div>`).join('')}</div><div class="calendar">${cells}</div></section>`;}
function cacheSet(data){try{localStorage.setItem(CACHE_KEY,JSON.stringify({savedAt:nowIso(),data}));log('cache.set',{key:CACHE_KEY,items:data?.items?.length||0});}catch(e){log('cache.set.fail',{error:e.message})}}
function cacheGet(){const keys=[CACHE_KEY,...OLD_CACHE_KEYS]; for(const key of keys){try{const raw=localStorage.getItem(key); if(!raw) continue; const data=normalizeData(JSON.parse(raw).data); if(data){if(key!==CACHE_KEY) cacheSet(data); log('cache.hit',{key,items:data.items.length}); return data;} log('cache.invalid',{key});}catch(e){log('cache.read.fail',{key,error:e.message})}} log('cache.miss'); return null;}
function toast(kind,text,pct=0,hold=0){const t=$('toast'),bar=$('toastBar'); t.className='toast show '+(kind||''); $('toastText').textContent=text; $('toastPct').textContent=Math.round(pct)+'%'; bar.style.width=Math.max(0,Math.min(100,pct))+'%'; if(hold){clearTimeout(toast._timer); toast._timer=setTimeout(()=>t.classList.remove('show'),hold)}}
async function withProgress(label,task,timeoutMs=10000){let p=0;toast('',label+' . . .',0);log('progress.start',{label,timeoutMs}); const started=Date.now(); const timer=setInterval(()=>{const elapsed=Date.now()-started; p=Math.min(88,Math.max(p+3, Math.round((elapsed/timeoutMs)*85)));toast('',label+' . . .',p)},160); try{const res=await promiseTimeout(task(),timeoutMs,label+' 제한 시간 초과'); clearInterval(timer); toast('success',label+' 완료',100,1500); log('progress.success',{label,elapsedMs:Date.now()-started}); return res;}catch(e){clearInterval(timer); state.lastError=e.message||String(e); toast('error',label+' 실패: '+state.lastError,100,8500); log('progress.fail',{label,error:state.lastError,elapsedMs:Date.now()-started}); renderDebug(false); throw e;}}
function promiseTimeout(p,ms,label){return new Promise((resolve,reject)=>{const timer=setTimeout(()=>reject(new Error(label||'timeout')),ms); Promise.resolve(p).then(v=>{clearTimeout(timer);resolve(v)},e=>{clearTimeout(timer);reject(e)})})}
function apiJsonp(params={},timeoutMs=9000){return new Promise((resolve,reject)=>{const cb='__hlcJsonp_'+Date.now()+'_'+Math.random().toString(36).slice(2); const url=new URL(API_URL); Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v)); url.searchParams.set('callback',cb); url.searchParams.set('_',Date.now()); const script=document.createElement('script'); let done=false; log('api.jsonp.start',{url:url.toString().replace(/callback=[^&]+/,'callback=...')}); const cleanup=()=>{try{delete window[cb]}catch(e){window[cb]=undefined} script.remove(); clearTimeout(timer)}; const timer=setTimeout(()=>{if(done)return;done=true;cleanup();log('api.jsonp.timeout',{timeoutMs});reject(new Error('JSONP 응답 시간 초과'))},timeoutMs); window[cb]=json=>{if(done)return;done=true;cleanup();log('api.jsonp.message',{ok:json?.ok,hasData:!!(json?.attendance||json?.data),reason:json?.reason,row:json?.rowNumber}); if(!json||json.ok===false)reject(new Error(json?.error||'JSONP API 오류')); else resolve(json)}; script.onerror=()=>{if(done)return;done=true;cleanup();log('api.jsonp.onerror');reject(new Error('JSONP 스크립트 로드 실패'))}; script.src=url.toString(); document.head.appendChild(script)})}
function apiFrameLoad(params={},timeoutMs=9000){return new Promise((resolve,reject)=>{const requestId='load_'+Date.now()+'_'+Math.random().toString(36).slice(2); const url=new URL(API_URL); url.searchParams.set('action','frame'); url.searchParams.set('op',params.action==='ping'?'ping':'load'); url.searchParams.set('requestId',requestId); url.searchParams.set('_',Date.now()); const iframe=document.createElement('iframe'); iframe.style.display='none'; iframe.setAttribute('aria-hidden','true'); let done=false; log('api.frame.start',{requestId,op:url.searchParams.get('op')}); const cleanup=()=>{window.removeEventListener('message',onMessage); iframe.remove(); clearTimeout(timer)}; const timer=setTimeout(()=>{if(done)return;done=true;cleanup();log('api.frame.timeout',{requestId,timeoutMs});reject(new Error('iframe 응답 시간 초과'))},timeoutMs); const onMessage=event=>{const msg=event.data||{}; if(!msg||msg.source!=='haram-leave-calendar-appscript'){return} log('api.frame.message.any',{requestId:msg.requestId,expected:requestId,origin:event.origin}); if(msg.requestId!==requestId) return; done=true; cleanup(); const json=msg.response||msg.payload||msg; log('api.frame.message.match',{ok:json?.ok,hasData:!!(json?.attendance||json?.data),reason:json?.reason,row:json?.rowNumber}); if(!json||json.ok===false)reject(new Error(json?.error||'iframe API 오류')); else resolve(json)}; window.addEventListener('message',onMessage); iframe.onerror=()=>{if(done)return;done=true;cleanup();log('api.frame.onerror',{requestId});reject(new Error('iframe 로드 실패'))}; iframe.src=url.toString(); document.body.appendChild(iframe)})}
function apiFetch(params={},timeoutMs=9000){const url=new URL(API_URL); Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v)); url.searchParams.set('_',Date.now()); log('api.fetch.start',{action:params.action||'loadAll'}); const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),timeoutMs); return fetch(url.toString(),{method:'GET',cache:'no-store',redirect:'follow',signal:ctrl.signal}).then(r=>{clearTimeout(timer);log('api.fetch.http',{status:r.status,type:r.type,url:r.url}); if(!r.ok)throw new Error('fetch HTTP '+r.status); return r.json()}).then(json=>{log('api.fetch.json',{ok:json?.ok,hasData:!!(json?.attendance||json?.data),reason:json?.reason,row:json?.rowNumber}); if(!json||json.ok===false)throw new Error(json?.error||'fetch API 오류'); return json}).catch(e=>{clearTimeout(timer);log('api.fetch.fail',{error:e.message||String(e)});throw e})}
async function apiGet(params={action:'loadAll'}){const seq=++state.loadSeq; log('api.get.start',{seq,params,policy:'jsonp-first-frame-fallback-no-fetch'}); try{const res=await apiJsonp(params,4500); log('api.get.success',{seq,method:'jsonp'}); return res;}catch(jsonpErr){log('api.get.method.fail',{seq,method:'jsonp',error:jsonpErr.message||String(jsonpErr)}); try{const res=await apiFrameLoad(params,4500); log('api.get.success',{seq,method:'frame'}); return res;}catch(frameErr){log('api.get.method.fail',{seq,method:'frame',error:frameErr.message||String(frameErr)}); throw new Error('jsonp='+(jsonpErr.message||jsonpErr)+' / frame='+(frameErr.message||frameErr));}}}
function apiPostFrame(action,body,timeoutMs=16000){return new Promise((resolve,reject)=>{const requestId='save_'+Date.now()+'_'+Math.random().toString(36).slice(2); const iframe=document.createElement('iframe'); iframe.name='hlcSaveFrame_'+requestId; iframe.style.display='none'; const form=document.createElement('form'); form.method='POST'; form.action=API_URL; form.target=iframe.name; form.style.display='none'; const add=(n,v)=>{const input=document.createElement('input');input.type='hidden';input.name=n;input.value=typeof v==='string'?v:JSON.stringify(v);form.appendChild(input)}; add('action',action); add('requestId',requestId); Object.entries(body||{}).forEach(([k,v])=>add(k,v)); let done=false; log('api.post.start',{action,requestId}); const cleanup=()=>{window.removeEventListener('message',onMessage);form.remove();iframe.remove();clearTimeout(timer)}; const timer=setTimeout(()=>{if(done)return;done=true;cleanup();log('api.post.timeout',{requestId});reject(new Error('저장 응답 시간 초과'))},timeoutMs); const onMessage=event=>{const msg=event.data||{}; if(!msg||msg.source!=='haram-leave-calendar-appscript'||msg.requestId!==requestId)return; done=true;cleanup();const json=msg.response||msg;log('api.post.message',{ok:json?.ok,error:json?.error}); if(!json.ok)reject(new Error(json.error||'저장 실패')); else resolve(json)}; window.addEventListener('message',onMessage); document.body.appendChild(iframe);document.body.appendChild(form);form.submit()})}
async function loadFromSheet(){return withProgress('구글 스프레드시트 DB 불러오는 중',async()=>{const json=await apiGet({action:'loadAll'}); const raw=json.attendance||json.data||json.payload; log('load.response',{ok:json?.ok,hasRaw:!!raw,reason:json?.reason,row:json?.rowNumber,serverTime:json?.serverTime}); const data=normalizeData(raw); if(!data) throw new Error('유효한 근태 JSON 행이 없습니다: '+(json.reason||json.diagnostic||'no-data')); cacheSet(data); render(data,'sheet'); return data},8500)}
function parseInput(){const raw=$('jsonInput').value.trim(); if(!raw)throw new Error('붙여넣은 JSON이 없습니다'); const parsed=JSON.parse(raw); const data=normalizeData(parsed); if(!data)throw new Error('items 배열이 있는 근태 JSON이 아닙니다'); return data}
async function saveToSheet(){const data=parseInput(); const token=$('tokenInput').value.trim(); if(!token)throw new Error('WRITE_TOKEN을 입력해 주세요'); await withProgress('구글 스프레드시트 DB 저장 중',async()=>await apiPostFrame('saveAttendance',{token,payload:data}),22000); cacheSet(data); render(data,'saved'); $('jsonInput').value=''; setAdminOk('Google Sheets 저장 완료')}
async function runDiagnostics(){setAdminWarn('연결 진단 중...'); renderDebug(true); const results={}; try{try{results.fetch=await apiFetch({action:'ping'},7000)}catch(e){results.fetchError=e.message||String(e)} try{results.jsonp=await apiJsonp({action:'ping'},5000)}catch(e){results.jsonpError=e.message||String(e)} try{results.frame=await apiFrameLoad({action:'ping'},5000)}catch(e){results.frameError=e.message||String(e)} try{results.debug=await apiFetch({action:'debug'},7000)}catch(e){results.debugError=e.message||String(e)} log('diagnostic.result',results); setAdminOk('진단 완료. 아래 연결 로그를 복사해서 원인 확인에 사용하세요.'); renderDebug(true);}catch(e){setAdminErr('진단 실패: '+(e.message||e)); log('diagnostic.fail',{error:e.message||String(e)}); renderDebug(true)}}
function bind(){ $('apiUrlInput').value=API_URL; $('tokenInput').value=localStorage.getItem(TOKEN_KEY)||''; $('adminBtn').onclick=()=>{$('adminPanel').classList.toggle('show')}; $('reloadBtn').onclick=()=>loadFromSheet().catch(()=>{}); $('loadBtn').onclick=()=>loadFromSheet().catch(e=>setAdminErr(e.message)); $('diagBtn').onclick=()=>runDiagnostics(); $('debugBtn').onclick=()=>renderDebug(true); $('saveSettingsBtn').onclick=()=>{localStorage.setItem(TOKEN_KEY,$('tokenInput').value.trim());setAdminOk('토큰 저장 완료')}; $('clearAdminBtn').onclick=()=>{localStorage.removeItem(TOKEN_KEY);$('tokenInput').value='';setAdminOk('브라우저 저장 삭제 완료')}; $('previewBtn').onclick=()=>{try{const d=parseInput();render(d,'preview');setAdminOk('화면 미리보기 완료')}catch(e){setAdminErr(e.message)}}; $('saveBtn').onclick=()=>saveToSheet().catch(e=>setAdminErr(e.message)); $('clearInputBtn').onclick=()=>$('jsonInput').value=''; $('copyLogBtn').onclick=async()=>{const txt=$('debugLog').textContent||''; try{await navigator.clipboard.writeText(txt);setAdminOk('로그 복사 완료')}catch(e){setAdminErr('로그 복사 실패: '+e.message)}}; $('clearLogBtn').onclick=()=>{localStorage.removeItem(LOG_KEY);log('log.cleared');renderDebug(true)}; $('cacheClearBtn').onclick=()=>{[CACHE_KEY,...OLD_CACHE_KEYS].forEach(k=>localStorage.removeItem(k));log('cache.cleared');render(null,'none');renderDebug(true)}; $('jsonInput').addEventListener('paste',e=>{const txt=(e.clipboardData||window.clipboardData).getData('text'); if(txt&&txt.trim().startsWith('{')){e.preventDefault();$('jsonInput').value=txt}}); $('jsonInput').addEventListener('focus',()=>{if($('jsonInput').value)$('jsonInput').select()})}
function setAdminOk(msg){$('adminStatus').className='status-line ok';$('adminStatus').textContent=msg} function setAdminErr(msg){$('adminStatus').className='status-line err';$('adminStatus').textContent=msg} function setAdminWarn(msg){$('adminStatus').className='status-line warn';$('adminStatus').textContent=msg}
function init(){log('boot',{href:location.href,userAgent:navigator.userAgent,apiUrl:API_URL,online:navigator.onLine}); bind(); if(/[?&]debug=1/.test(location.search)){$('adminPanel').classList.add('show');renderDebug(true)} const cached=cacheGet(); if(cached){render(cached,'cache'); log('init.cache.first',{items:cached.items.length});} loadFromSheet().catch(e=>{log('init.load.fail',{error:e.message||String(e),hasCache:!!cached}); if(!cached)render(null,'none')})}
document.addEventListener('DOMContentLoaded',init);
})();
</script>
